services:
    ddns-updater:
        image: qmcgaw/ddns-updater
        container_name: ddns-updater
        restart: always
        network_mode: host
        volumes:
            - ./ddns:/updater/data
        environment:
            - TZ=Europe/Belgrade

    npm:
        image: 'jc21/nginx-proxy-manager:latest'
        container_name: npm
        restart: unless-stopped
        ports:
            - '80:80'
            - '81:81'
            - '443:443'
        volumes:
            - ./npm/data:/data
            - ./npm/letsencrypt:/etc/letsencrypt